<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объявления — Портал группы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='announcements.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-logo-row">
                <img src="{{ url_for('static', filename='img/sfedu.png') }}" alt="Логотип ЮФУ" class="header-logo">
                <h1>Объявления</h1>
                <img src="{{ url_for('static', filename='img/irtsu.png') }}" alt="ИРТСУ" class="header-logo">
            </div>
        </div>
    </header>

    <main class="page">
        <div class="page-inner">
            <div class="card">
                <!-- Форма добавления объявления -->
                <div class="announcement-form">
                    <h2>Добавить объявление</h2>
                    <div id="message"></div>
                    <input type="text" id="author" placeholder="Ваше имя (или ник)" maxlength="50">
                    <textarea id="text" placeholder="Текст объявления..." maxlength="500"></textarea>
                    <button id="submit-btn" onclick="addAnnouncement()">Добавить объявление</button>
                </div>

                <!-- Список объявлений -->
                {% if announcements %}
                    <h3>Все объявления</h3>
                    <ul class="announcement-list">
                        {% for ann in announcements %}
                            <li class="announcement-item">
                                <div class="announcement-meta">
                                    <span class="announcement-author">{{ ann.author }}</span>
                                    <span class="announcement-date">{{ ann.date }}</span>
                                </div>
                                <div class="announcement-text">{{ ann.text }}</div>
                            </li>
                        {% endfor %}
                    </ul>
                {% else %}
                    <p>Объявлений пока нет. Будьте первым!</p>
                {% endif %}
            </div>
        </div>
    </main>

    <!-- Мобильная навигация внизу -->
    <nav class="nav-bottom">
        <a href="{{ url_for('home') }}">Главная</a>
        <a href="{{ url_for('schedule_page') }}">Расписание</a>
        <a href="{{ url_for('links_page') }}">Ссылки</a>
        <a href="{{ url_for('announcements_page') }}" class="active">Объявления</a>
    </nav>

    <script>
        async function addAnnouncement() {
            const textInput = document.getElementById('text');
            const authorInput = document.getElementById('author');
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submit-btn');
            
            const text = textInput.value.trim();
            const author = authorInput.value.trim() || 'Аноним';
            
            if (!text) {
                messageDiv.innerHTML = '<div class="announcement-message error">Введите текст объявления</div>';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
            
            try {
                const response = await fetch('/api/announcements', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text, author })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.innerHTML = '<div class="announcement-message success">Объявление добавлено!</div>';
                    textInput.value = '';
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<div class="announcement-message error">' + (data.error || 'Ошибка') + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="announcement-message error">Ошибка соединения</div>';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Добавить объявление';
            }
        }
    </script>
</body>
</html>
