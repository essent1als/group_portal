<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ссылки — Портал группы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='links.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-logo-row">
                <img src="{{ url_for('static', filename='img/sfedu.png') }}" alt="Логотип ЮФУ" class="header-logo">
                <h1>Полезные ссылки</h1>
                <img src="{{ url_for('static', filename='img/irtsu.png') }}" alt="ИРТСУ" class="header-logo">
            </div>
            <nav class="main-nav">
                <a href="{{ url_for('home') }}">Главная</a>
                <a href="{{ url_for('schedule_page') }}">Расписание</a>
                <a href="{{ url_for('links_page') }}">Ссылки</a>
                <a href="{{ url_for('announcements_page') }}">Объявления</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="page-inner">
            <div class="card">
                {% if links %}
                    {% for category in links %}
                        <h2>{{ category.name }}</h2>
                        <ul class="link-list">
                            {% for link in category.links %}
                                <li><a href="{{ link.url }}" target="_blank" rel="noopener noreferrer">{{ link.name }}</a></li>
                            {% endfor %}
                        </ul>
                    {% endfor %}
                {% else %}
                    <p>Ссылок пока нет.</p>
                {% endif %}
            </div>
        </div>
    </main>
</body>
</html>
