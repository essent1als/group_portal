<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='img/header_logo.png') }}" type="image/png">
    <title>Расписание — Портал группы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-logo-row">
                <img src="https://sfedu.ru/img/new_design_2020/logo.png" alt="Логотип ЮФУ" class="header-logo">
                <h1>Расписание</h1>
                <img src="{{ url_for('static', filename='img/irtsu.png') }}" alt="ИРТСУ" class="header-logo">
            </div>
            <nav class="main-nav">
                <a href="{{ url_for('home') }}">Главная</a>
                <a href="{{ url_for('schedule_page') }}">Расписание</a>
                <a href="{{ url_for('links_page') }}">Ссылки</a>
                <a href="{{ url_for('announcements_page') }}">Объявления</a>
                {% if current_user and current_user.logged_in %}
                    <a href="{{ url_for('logout') }}" class="nav-user">Выход</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="page-inner">
            <div class="card">
                <h2>Расписание занятий</h2>
                
                <a href="{{ modeus_url }}" target="_blank" style="display: block; padding: 14px; background: #4a76a8; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 500; margin-bottom: 15px;">
                    🌐 Открыть в Modeus
                </a>
                
                <button onclick="toggleEditMode()" id="mobile-edit-btn" style="display: block; width: 100%; padding: 14px; background: #fff; color: #4a76a8; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 500; margin-bottom: 15px; border: 2px solid #4a76a8; cursor: pointer;">
                    ✏️ Редактировать
                </button>
                
                <button onclick="saveAllChanges()" id="mobile-save-btn" style="display: none; width: 100%; padding: 14px; background: #4caf50; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 500; margin-bottom: 15px; border: none; cursor: pointer;">
                    💾 Сохранить изменения
                </button>
                
                <div id="schedule-data"></div>
            </div>
        </div>
    </main>

    <!-- Модальное окно для добавления пары -->
    <div id="lesson-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Добавить пару</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-week">
                <input type="hidden" id="edit-day">
                <input type="hidden" id="edit-pair">
                
                <div class="form-group">
                    <label for="lesson-subject">Название предмета:</label>
                    <input type="text" id="lesson-subject" placeholder="Например: Высшая математика">
                </div>
                
                <div class="form-group">
                    <label for="lesson-type">Тип пары:</label>
                    <select id="lesson-type">
                        <option value="Лекция">Лекция</option>
                        <option value="Практика">Практика</option>
                        <option value="Лабораторная">Лабораторная</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="lesson-room">Место проведения:</label>
                    <input type="text" id="lesson-room" placeholder="Например: Г-333">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="saveLesson()">Сохранить</button>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p>Сайт портала группы · <a href="https://sfedu.modeus.org" target="_blank" style="color: rgba(255,255,255,0.8);">Modeus</a></p>
    </footer>

    <script>
        let scheduleData = {};
        let isEditMode = false;
        
        // Карта времени -> номер пары
        const pairTimes = {
            1: '8:00 - 9:35',
            2: '9:50 - 11:25',
            3: '11:55 - 13:30',
            4: '13:45 - 15:20',
            5: '15:50 - 17:25',
            6: '17:35 - 19:10',
            7: '19:15 - 20:50'
        };
        
        // Переключение режима редактирования
        function toggleEditMode() {
            if (isEditMode) {
                isEditMode = false;
                document.getElementById('mobile-edit-btn').style.display = 'block';
                document.getElementById('mobile-edit-btn').textContent = '✏️ Редактировать';
                document.getElementById('mobile-save-btn').style.display = 'none';
            } else {
                isEditMode = true;
                document.getElementById('mobile-edit-btn').style.display = 'none';
                document.getElementById('mobile-save-btn').style.display = 'block';
            }
            displaySchedule(scheduleData);
        }
        
        // Загрузка статического расписания
        async function loadStaticSchedule() {
            try {
                const response = await fetch('/data/schedule_static.json');
                if (response.ok) {
                    scheduleData = await response.json();
                    displaySchedule(scheduleData);
                } else {
                    document.getElementById('schedule-data').innerHTML = 
                        '<p style="color: #666; text-align: center; padding: 20px;">Расписание не загружено</p>';
                }
            } catch(e) {
                console.error('Error loading schedule:', e);
                document.getElementById('schedule-data').innerHTML = 
                    '<p style="color: #666; text-align: center; padding: 20px;">Ошибка загрузки расписания</p>';
            }
        }
        
        // Отображение расписания
        function displaySchedule(data) {
            // Карта типов занятий к цветам
            const typeColors = {
                'Практика': '#cfeafc',
                'Лекция': '#dcedc8',
                'Лабораторная': '#ffe0b2'
            };
            
            const typeBorderColors = {
                'Практика': '#bbdefb',
                'Лекция': '#d3e8bc',
                'Лабораторная': '#f7d7a6'
            };
            
            const pairNumbers = {
                '08:00': 1, '8:00': 1,
                '09:50': 2, '9:50': 2,
                '11:55': 3, '11:55': 3,
                '13:45': 4, '13:45': 4,
                '15:50': 5, '15:50': 5,
                '17:35': 6, '17:35': 6,
                '19:15': 7, '19:15': 7
            };
            
            function getPairNumber(timeStr) {
                if (!timeStr) return '';
                const startTime = timeStr.split(' - ')[0];
                return pairNumbers[startTime] || '';
            }
            
            function getTypeColor(type) {
                return typeColors[type] || '#f8f9fa';
            }
            
            function getTypeBorderColor(type) {
                return typeBorderColors[type] || '#dee2e6';
            }
            
            // Определение текущего дня
            const daysMap = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
            const today = new Date();
            const currentDay = daysMap[today.getDay() === 0 ? 6 : today.getDay() - 1]; // 0=Пн
            
            let html = '';
            
            for (const [week, days] of Object.entries(data)) {
                html += `<h3 style="color: #4a76a8; margin: 15px 0 10px 0;">${week === 'week_1' ? 'Нечётная неделя' : 'Чётная неделя'}</h3>`;
                
                for (const [day, dayData] of Object.entries(days)) {
                    const dayDate = dayData && dayData.date ? dayData.date : '';
                    const lessons = dayData && dayData.lessons ? dayData.lessons : [];
                    const isToday = day === currentDay;
                    const dayStyle = isToday ? 'color: #fff; background: #4a76a8; padding: 8px 12px; border-radius: 8px; margin: 20px 0 10px 0;' : 'color: #333; margin: 20px 0 10px 0; padding-bottom: 8px; border-bottom: 2px solid #4a76a8;';
                    
                    html += `<h4 style="${dayStyle}">${day} ${isToday ? '🔴' : ''} <span style="${isToday ? 'color: rgba(255,255,255,0.8);' : 'color: #666;'} font-weight: normal; font-size: 12px;">${dayDate ? '(' + dayDate + ')' : ''}</span></h4>`;
                    
                    // Создаём карту существующих пар
                    const lessonMap = {};
                    for (const lesson of lessons) {
                        const pairNum = getPairNumber(lesson.time);
                        if (pairNum) lessonMap[pairNum] = lesson;
                    }
                    
                    // Всего 7 пар в день
                    const totalPairs = 7;
                    
                    for (let pairNum = 1; pairNum <= totalPairs; pairNum++) {
                        const lesson = lessonMap[pairNum];
                        const pairTime = pairTimes[pairNum] || '';
                        
                        if (lesson) {
                            const bgColor = getTypeColor(lesson.type);
                            const borderColor = getTypeBorderColor(lesson.type);
                            
                            // Кнопка удаления для режима редактирования
                            const deleteBtn = isEditMode ? 
                                `<button class="edit-btn delete-btn" onclick="removeLesson('${week}', '${day}', ${pairNum})" title="Удалить">−</button>` : '';
                            
                            html += `
                            <div style="background: ${bgColor}; border: 2px solid ${borderColor}; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; position: relative;">
                                ${deleteBtn}
                                <div style="background: rgba(0,0,0,0.1); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0;">
                                    ${pairNum}
                                </div>
                                <div style="flex: 1;">
                                    <div style="font-weight: bold; color: #333; margin-bottom: 4px;">
                                        ${pairTime}
                                    </div>
                                    <div style="font-size: 15px; margin-bottom: 4px;">${lesson.subject || ''}</div>
                                    <div style="color: #666; font-size: 13px;">
                                        ${lesson.type || ''}
                                        ${lesson.teacher ? ' · ' + lesson.teacher : ''}
                                        ${lesson.room ? ' · ' + lesson.room : ''}
                                    </div>
                                </div>
                            </div>`;
                        } else {
                            // Пустой блок
                            const addBtn = isEditMode ? 
                                `<button class="edit-btn add-btn" onclick="openAddModal('${week}', '${day}', ${pairNum})" title="Добавить">+</button>` : '';
                            
                            html += `
                            <div style="background: #f8f9fa; border: 2px dashed #dee2e6; border-radius: 8px; padding: 12px; margin-bottom: 10px; text-align: center; color: #999; position: relative;">
                                ${addBtn}
                                <div style="background: rgba(0,0,0,0.1); border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; margin-bottom: 6px;">
                                    ${pairNum}
                                </div>
                                <div style="font-size: 12px;">${pairTime} —</div>
                            </div>`;
                        }
                    }
                }
            }
            
            if (!html) {
                html = '<p style="color: #666; text-align: center;">Расписание пустое</p>';
            }
            
            document.getElementById('schedule-data').innerHTML = html;
        }
        
        // Открытие модального окна для добавления пары
        function openAddModal(week, day, pairNum) {
            document.getElementById('edit-week').value = week;
            document.getElementById('edit-day').value = day;
            document.getElementById('edit-pair').value = pairNum;
            document.getElementById('modal-title').textContent = 'Добавить пару';
            
            document.getElementById('lesson-subject').value = '';
            document.getElementById('lesson-type').value = 'Лекция';
            document.getElementById('lesson-room').value = '';
            
            document.getElementById('lesson-modal').style.display = 'block';
        }
        
        // Закрытие модального окна
        function closeModal() {
            document.getElementById('lesson-modal').style.display = 'none';
        }
        
        // Сохранение пары
        function saveLesson() {
            const week = document.getElementById('edit-week').value;
            const day = document.getElementById('edit-day').value;
            const pairNum = parseInt(document.getElementById('edit-pair').value);
            const subject = document.getElementById('lesson-subject').value;
            const type = document.getElementById('lesson-type').value;
            const room = document.getElementById('lesson-room').value;
            
            if (!subject.trim()) {
                alert('Пожалуйста, введите название предмета');
                return;
            }
            
            const newLesson = {
                time: pairTimes[pairNum],
                subject: subject,
                type: type,
                teacher: '',
                room: room
            };
            
            if (!scheduleData[week]) scheduleData[week] = {};
            if (!scheduleData[week][day]) {
                scheduleData[week][day] = { date: '', lessons: [] };
            }
            if (!scheduleData[week][day].lessons) {
                scheduleData[week][day].lessons = [];
            }
            
            scheduleData[week][day].lessons = scheduleData[week][day].lessons.filter(l => {
                const num = getPairNumber(l.time);
                return num !== pairNum;
            });
            
            scheduleData[week][day].lessons.push(newLesson);
            
            displaySchedule(scheduleData);
            closeModal();
        }
        
        // Удаление пары
        function removeLesson(week, day, pairNum) {
            if (!confirm('Вы уверены, что хотите удалить эту пару?')) {
                return;
            }
            
            if (scheduleData[week] && scheduleData[week][day] && scheduleData[week][day].lessons) {
                scheduleData[week][day].lessons = scheduleData[week][day].lessons.filter(l => {
                    const num = getPairNumber(l.time);
                    return num !== pairNum;
                });
            }
            
            displaySchedule(scheduleData);
        }
        
        // Сохранение всех изменений
        async function saveAllChanges() {
            try {
                const response = await fetch('/api/save-schedule', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(scheduleData)
                });
                
                const result = await response.json();
                if (result.success) {
                    alert('Расписание сохранено!');
                    toggleEditMode();
                } else {
                    alert('Ошибка сохранения: ' + result.error);
                }
            } catch(e) {
                console.error('Error saving:', e);
                alert('Ошибка сохранения расписания');
            }
        }
        
        // Вспомогательная функция
        function getPairNumber(timeStr) {
            if (!timeStr) return '';
            const pairNumbers = {
                '08:00': 1, '8:00': 1,
                '09:50': 2, '9:50': 2,
                '11:55': 3, '11:55': 3,
                '13:45': 4, '13:45': 4,
                '15:50': 5, '15:50': 5,
                '17:35': 6, '17:35': 6,
                '19:15': 7, '19:15': 7
            };
            const startTime = timeStr.split(' - ')[0];
            return pairNumbers[startTime] || '';
        }
        
        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('lesson-modal');
            if (event.target == modal) {
                closeModal();
            }
        }
        
        // Загружаем расписание при открытии страницы
        loadStaticSchedule();
    </script>
    <a href="#" class="back-to-top" id="backToTop" title="Наверх">↑</a>
    <script>
        // Кнопка наверх
        const backToTop = document.getElementById('backToTop');
        if (backToTop) {
            window.addEventListener('scroll', () => {
                backToTop.style.display = window.scrollY > 300 ? 'flex' : 'none';
            });
            backToTop.style.display = 'none';
        }
    </script>
</body>
</html>
