<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание — Портал группы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-logo-row">
                <img src="https://sfedu.ru/img/new_design_2020/logo.png" alt="Логотип ЮФУ" class="header-logo">
                <h1>Расписание</h1>
                <img src="{{ url_for('static', filename='img/irtsu.png') }}" alt="ИРТСУ" class="header-logo">
            </div>
            <nav class="main-nav">
                <a href="{{ url_for('home') }}">Главная</a>
                <a href="{{ url_for('schedule_page') }}">Расписание</a>
                <a href="{{ url_for('links_page') }}">Ссылки</a>
                <a href="{{ url_for('announcements_page') }}">Объявления</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="page-inner">
            <div class="card">
                <h2>Расписание</h2>
                
                <div class="modeus-notice" style="background: #fff3cd; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px;">
                    <strong>Важно:</strong> Для просмотра расписания необходимо войти в систему Modeus. 
                    Если iframe не загружается, используйте кнопку ниже.
                </div>

                <div class="modeus-iframe-wrapper" style="margin-bottom: 15px;">
                    <div class="modeus-loading" id="loading" style="text-align: center; padding: 20px;">
                        <span>Загрузка расписания...</span>
                    </div>
                    <iframe 
                        src="{{ modeus_embed_url }}" 
                        title="Расписание Modeus"
                        style="width: 100%; height: 500px; border: none; border-radius: 8px;"
                        allow="clipboard-write; fullscreen"
                        onload="document.getElementById('loading').style.display = 'none';"
                        onerror="this.style.display = 'none'; document.getElementById('loading').style.display = 'none'; document.getElementById('schedule-fallback').style.display = 'block';">
                    </iframe>
                    <div id="schedule-fallback" style="display: none; text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px;">
                        <p style="color: #666;">Не удалось загрузить расписание в iframe</p>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <a href="{{ modeus_url }}" target="_blank" style="flex: 1; display: inline-block; padding: 12px 20px; background: #4a76a8; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-size: 16px;">
                        ↗ Открыть в Modeus
                    </a>
                    <button onclick="location.reload()" style="padding: 12px 20px; background: #6c757d; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">
                        Обновить
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
