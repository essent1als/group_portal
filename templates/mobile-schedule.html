<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание — Портал группы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-logo-row">
                <img src="https://sfedu.ru/img/new_design_2020/logo.png" alt="Логотип ЮФУ" class="header-logo">
                <h1>Расписание</h1>
                <img src="{{ url_for('static', filename='img/irtsu.png') }}" alt="ИРТСУ" class="header-logo">
            </div>
            <nav class="main-nav">
                <a href="{{ url_for('home') }}">Главная</a>
                <a href="{{ url_for('schedule_page') }}">Расписание</a>
                <a href="{{ url_for('links_page') }}">Ссылки</a>
                <a href="{{ url_for('announcements_page') }}">Объявления</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="page-inner">
            <div class="card">
                <h2>Расписание занятий</h2>
                
                <div id="schedule-data"></div>
                
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #dee2e6;">
                    <a href="{{ modeus_url }}" target="_blank" style="display: block; padding: 14px; background: #4a76a8; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 500;">
                        🌐 Открыть в Modeus
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Сайт портала группы · <a href="https://sfedu.modeus.org" target="_blank" style="color: rgba(255,255,255,0.8);">Modeus</a></p>
    </footer>

    <script>
        // Загрузка статического расписания
        async function loadStaticSchedule() {
            try {
                const response = await fetch('/data/schedule_static.json');
                if (response.ok) {
                    const data = await response.json();
                    displaySchedule(data);
                } else {
                    document.getElementById('schedule-data').innerHTML = 
                        '<p style="color: #666; text-align: center; padding: 20px;">Расписание не загружено</p>';
                }
            } catch(e) {
                console.error('Error loading schedule:', e);
                document.getElementById('schedule-data').innerHTML = 
                    '<p style="color: #666; text-align: center; padding: 20px;">Ошибка загрузки расписания</p>';
            }
        }
        
        // Отображение расписания
        function displaySchedule(data) {
            // Карта типов занятий к цветам
            const typeColors = {
                'Практика': '#cfeafc',
                'Лекция': '#dcedc8',
                'Лабораторная': '#ffe0b2'
            };
            
            const typeBorderColors = {
                'Практика': '#bbdefb',
                'Лекция': '#d3e8bc',
                'Лабораторная': '#f7d7a6'
            };
            
            const pairNumbers = {
                '08:00': 1, '8:00': 1,
                '09:50': 2, '9:50': 2,
                '11:55': 3, '11:55': 3,
                '13:45': 4, '13:45': 4,
                '15:50': 5, '15:50': 5,
                '17:35': 6, '17:35': 6,
                '19:15': 7, '19:15': 7
            };
            
            function getPairNumber(timeStr) {
                if (!timeStr) return '';
                const startTime = timeStr.split(' - ')[0];
                return pairNumbers[startTime] || '';
            }
            
            function getTypeColor(type) {
                return typeColors[type] || '#f8f9fa';
            }
            
            function getTypeBorderColor(type) {
                return typeBorderColors[type] || '#dee2e6';
            }
            
            let html = '';
            
            for (const [week, days] of Object.entries(data)) {
                html += `<h3 style="color: #4a76a8; margin: 15px 0 10px 0;">${week === 'week_1' ? 'Нечётная неделя' : 'Чётная неделя'}</h3>`;
                
                for (const [day, dayData] of Object.entries(days)) {
                    const dayDate = dayData && dayData.date ? dayData.date : '';
                    const lessons = dayData && dayData.lessons ? dayData.lessons : [];
                    
                    html += `<h4 style="color: #333; margin: 15px 0 10px 0;">${day} <span style="color: #666; font-weight: normal; font-size: 12px;">${dayDate ? '(' + dayDate + ')' : ''}</span></h4>`;
                    
                    if (lessons.length > 0) {
                        for (const lesson of lessons) {
                            const bgColor = getTypeColor(lesson.type);
                            const borderColor = getTypeBorderColor(lesson.type);
                            
                            html += `
                            <div style="background: ${bgColor}; border: 2px solid ${borderColor}; border-radius: 8px; padding: 12px; margin-bottom: 10px;">
                                <div style="font-weight: bold; color: #333; margin-bottom: 4px;">
                                    ${lesson.time || ''}
                                </div>
                                <div style="font-size: 15px; margin-bottom: 4px;">${lesson.subject || ''}</div>
                                <div style="color: #666; font-size: 13px;">
                                    ${lesson.type || ''}
                                    ${lesson.teacher ? ' · ' + lesson.teacher : ''}
                                    ${lesson.room ? ' · ' + lesson.room : ''}
                                </div>
                            </div>`;
                        }
                    } else {
                        html += `<div style="background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; text-align: center; color: #999;">
                            Нет пар
                        </div>`;
                    }
                }
            }
            
            if (!html) {
                html = '<p style="color: #666; text-align: center;">Расписание пустое</p>';
            }
            
            document.getElementById('schedule-data').innerHTML = html;
        }
        
        // Загружаем расписание при открытии страницы
        loadStaticSchedule();
    </script>
</body>
</html>
